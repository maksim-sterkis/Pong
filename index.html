<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Pong</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* CSS reset to ensure zero bloat and absolute black background */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Prevent browser gestures */
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
        }
        /* Center the canvas and keep its retro aspect ratio crisp */
        canvas {
            box-sizing: content-box; /* Ensures the borders don't squeeze the aspect ratio */
            background-color: #000000;
            display: block;
            border: 2px solid #222222;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.1);

            /* Crucial CSS properties to disable browser-side interpolation/smoothing */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Logical coordinates (Virtual canvas bounds, dynamically swapped on orientation change)
    let isLandscape = false;
    let logicalWidth = 600;
    let logicalHeight = 800;

    // Game States: 'START', 'PLAYING', 'GAMEOVER', 'SETTINGS'
    let gameState = 'START';
    let gameMode = null; // 1: Wall, 2: AI, 3: Spectate, 4: Local PvP
    let isPaused = false;
    let score = 0;

    // Mode 4 PvP Variables
    let scoreP1 = 0;
    let scoreP2 = 0;
    const MAX_SCORE = 11;
    let winnerMode4 = 0;

    // AI Difficulty Configuration (EASY, MEDIUM, HARD)
    let aiDifficulty = 'MEDIUM'; // Default

    // Orientation Setting Configurations ('PORTRAIT', 'LANDSCAPE', 'AUTO')
    let orientationSetting = 'AUTO';

    // Keyboard Menu Navigation Highlight Indexes
    let menuHighlightIndex = 0; // Main menu pointer
    let settingsFocusZone = 'sidebar'; // 'sidebar' or 'content'
    let settingsHighlightTab = 0; // Sidebar tabs index
    let settingsHighlightOption = 0; // Inner tab options index
    let pauseHighlightIndex = 0; // Pause overlay index
    let activeSettingTab = 'controls'; // Current active settings tab (FIXED: Added missing variable)

    // Interactive Game Data Indicators
    let serveDelayFrames = 0; // Frames to freeze ball before launching
    let baselineHighScore = 0; // Stores baseline high score at start of run
    let stateTransitionCooldown = 0; // Debounce frame count to prevent overlapping clicks

    // Load High Scores from Local Storage
    let highScoreMode1 = parseInt(localStorage.getItem('retroPongHighScore1')) || 0;
    let highScoreMode2 = parseInt(localStorage.getItem('retroPongHighScore2')) || 0;

    function updateHighScore(mode, scoreToSave) {
        localStorage.setItem(`retroPongHighScore${mode}`, scoreToSave);
    }

    // Colors
    const COLOR_BG = '#000000';
    const COLOR_PADDLE = '#ffffff';
    const COLOR_BALL = '#39ff14'; // Retro Phosphor Green
    const COLOR_TEXT = '#ffffff';
    const COLOR_MUTED = '#888888';

    // Font Config
    const FONT_FAMILY = "'Press Start 2P', monospace";

    // Dynamic High-DPI Backing Store Scaling Setup with Fluid Orientation fitting
    function resize() {
        const dpr = window.devicePixelRatio || 1;

        // Detect physical layout orientation or apply strict setting
        const prevLandscape = isLandscape;
        if (orientationSetting === 'PORTRAIT') {
            isLandscape = false;
        } else if (orientationSetting === 'LANDSCAPE') {
            isLandscape = true;
        } else {
            isLandscape = window.innerWidth > window.innerHeight;
        }

        // Swap core grid coordinate dimensions
        logicalWidth = isLandscape ? 800 : 600;
        logicalHeight = isLandscape ? 600 : 800;

        // Calculate maximum available space with an elegant margin for outer borders
        const margin = 16;
        const maxW = window.innerWidth - margin;
        const maxH = window.innerHeight - margin;

        let targetWidth = maxW;
        let targetHeight = maxW * (logicalHeight / logicalWidth);

        // If the calculated height is too tall for the screen, scale by height instead
        if (targetHeight > maxH) {
            targetHeight = maxH;
            targetWidth = maxH * (logicalWidth / logicalHeight);
        }

        // Set exact style sizing matching the strict aspect ratio to prevent stretching
        canvas.style.width = `${Math.round(targetWidth)}px`;
        canvas.style.height = `${Math.round(targetHeight)}px`;

        // Update canvas backing buffer with absolute pixel integers to prevent browser subpixel stretching
        canvas.width = Math.round(logicalWidth * dpr);
        canvas.height = Math.round(logicalHeight * dpr);

        // Scale context drawing smoothly mapping dynamic backing grid back to dynamic logical grid
        ctx.scale(canvas.width / logicalWidth, canvas.height / logicalHeight);

        // Disable anti-aliasing for raw pixel perfect edges
        ctx.imageSmoothingEnabled = false;
        ctx.mozImageSmoothingEnabled = false;
        ctx.webkitImageSmoothingEnabled = false;
        ctx.msImageSmoothingEnabled = false;

        // If orientation changes mid-play, adjust paddle shapes and anchors seamlessly
        if (prevLandscape !== isLandscape && gameState === 'PLAYING') {
            const padW = isLandscape ? 14 : 100;
            const padH = isLandscape ? 100 : 14;
            player.width = padW; player.height = padH;
            ai.width = padW; ai.height = padH;

            if (!isLandscape) {
                player.x = (logicalWidth - player.width) / 2;
                player.y = 750;
                ai.x = (logicalWidth - ai.width) / 2;
                ai.y = 40;
            } else {
                player.x = 40;
                player.y = (logicalHeight - player.height) / 2;
                ai.x = logicalWidth - 40 - ai.width;
                ai.y = (logicalHeight - ai.height) / 2;
            }
            player.prevX = player.x; player.prevY = player.y;
            ai.prevX = ai.x; ai.prevY = ai.y;
            resetBall();
        }
    }

    // Call resize on initial frame & whenever browser screen environment changes
    window.addEventListener('resize', resize);
    resize();

    // Visual Polish Systems
    let crtEnabled = true;
    let shakeTime = 0;
    let shakeIntensity = 0;
    const particles = [];
    const ballTrail = [];
    const MAX_TRAIL_LENGTH = 7;

    function triggerShake(intensity, duration) {
        shakeIntensity = intensity;
        shakeTime = duration;
    }

    function createSparks(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                radius: Math.random() * 2.5 + 1.2,
                alpha: 1.0,
                decay: Math.random() * 0.03 + 0.015,
                color: color
            });
        }
    }

    function updateVisualEffects() {
        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= p.decay;
            if (p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }

        // Update trail (decaying smoothly during countdown instead of flashing off instantly)
        if (gameState === 'PLAYING' && !isPaused) {
            if (serveDelayFrames === 0) {
                ballTrail.push({ x: ball.x, y: ball.y });
                if (ballTrail.length > MAX_TRAIL_LENGTH) {
                    ballTrail.shift();
                }
            } else {
                // Decay the old trail frame-by-frame during resets/countdowns
                if (ballTrail.length > 0) {
                    ballTrail.shift();
                }
            }
        } else if (gameState !== 'PLAYING') {
            ballTrail.length = 0;
        }
    }

    function drawVisualEffects() {
        // Draw Ball Trail
        for (let i = 0; i < ballTrail.length; i++) {
            const pt = ballTrail[i];
            const alpha = (i + 1) / (ballTrail.length + 1) * 0.35;
            ctx.fillStyle = COLOR_BALL;
            ctx.globalAlpha = alpha;
            ctx.fillRect(pt.x - ball.radius, pt.y - ball.radius, ball.radius * 2, ball.radius * 2);
        }
        ctx.globalAlpha = 1.0; // Reset alpha

        // Draw Particles
        for (let p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fillRect(p.x - p.radius, p.y - p.radius, p.radius * 2, p.radius * 2);
        }
        ctx.globalAlpha = 1.0; // Reset alpha
    }

    function drawCRTOverlay() {
        if (!crtEnabled) return;
        ctx.save();

        // Scanline lines
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        for (let y = 0; y < logicalHeight; y += 4) {
            ctx.fillRect(0, y, logicalWidth, 1.5);
        }

        // Retro Vignette
        const vignette = ctx.createRadialGradient(
            logicalWidth / 2, logicalHeight / 2, logicalHeight / 3,
            logicalWidth / 2, logicalHeight / 2, logicalHeight * 0.75
        );
        vignette.addColorStop(0, 'rgba(0, 0, 0, 0)');
        vignette.addColorStop(1, 'rgba(0, 0, 0, 0.45)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, logicalWidth, logicalHeight);
        ctx.restore();
    }

    // Web Audio API Synthesizer
    let audioCtx = null;
    let soundEnabled = true;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTone(freq, type, duration) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playSound(type) {
        if (type === 'paddle') playTone(440, 'square', 0.1);    // High beep
        if (type === 'wall') playTone(220, 'square', 0.1);      // Low beep
        if (type === 'score') playTone(880, 'square', 0.15);    // Very high success beep
        if (type === 'gameover') playTone(110, 'sawtooth', 0.5); // Deep buzz
    }

    // Game Speed Tuning (Spectate Mode only)
    let timeScale = 1.0;
    let speedNotificationTimer = 0;

    // Paddles Configuration (Speed dynamically set based on Difficulty Tiers)
    const player = {
        x: 250, y: 750, width: 100, height: 14, speed: 8,
        prevX: 250, prevY: 750, currentTargetX: 300, currentTargetY: 400
    };

    const ai = {
        x: 250, y: 40, width: 100, height: 14, speed: 8,
        prevX: 250, prevY: 40, currentTargetX: 300, currentTargetY: 400
    };

    // Ball Configuration
    const INITIAL_BALL_SPEED = 5.5;
    const ball = { x: 300, y: 400, radius: 8, vx: 0, vy: 0, speed: INITIAL_BALL_SPEED };

    // Key tracking
    const keys = {
        ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false,
        KeyA: false, KeyD: false, KeyW: false, KeyS: false
    };

    // Universal Input Tracking & Identifier Binding
    let mouseActive = false;
    let mouseTouchPoint = { x: 0, y: 0 };
    let activeTouches = []; // Retained list of active physical fingers with ID mapping

    // Unique touch mappings to secure paddles in Mode 4
    let p1TouchId = null;
    let p2TouchId = null;

    // Pause toggle trigger
    function togglePause() {
        if (gameState === 'PLAYING') {
            isPaused = !isPaused;
            playSound('wall');
        }
    }

    // Dynamic layout generator functions - The single-source-of-truth for both drawing AND click check bounds!
    function getMainMenuButtons() {
        const btnW = 400;
        const btnH = isLandscape ? 50 : 60; // Shorter spacing in landscape 600px grid
        const spacing = isLandscape ? 58 : 80;
        const startY = isLandscape ? 170 : 220;
        const btnX = (logicalWidth - btnW) / 2;

        return [
            { mode: 1, x: btnX, y: startY, w: btnW, h: btnH, title: "1: WALL MODE", desc: "Classic Solo Bounce" },
            { mode: 2, x: btnX, y: startY + spacing, w: btnW, h: btnH, title: "2: AI MODE", desc: "VS Dynamic Machine" },
            { mode: 3, x: btnX, y: startY + spacing * 2, w: btnW, h: btnH, title: "3: BOTS ONLY", desc: "Spectate / Zero Player" },
            { mode: 4, x: btnX, y: startY + spacing * 3, w: btnW, h: btnH, title: "4: LOCAL PVP", desc: "2-Player Shared Screen" },
            { mode: 'settings', x: btnX, y: startY + spacing * 4, w: btnW, h: btnH, title: "SETTINGS", desc: "Controls, AI & A/V Config" }
        ];
    }

    const mainButtons = getMainMenuButtons(); // Global definition for menu item length bounds

    function getSettingsTabs() {
        const tabW = 160;
        const tabH = isLandscape ? 42 : 50;
        const startX = isLandscape ? 30 : 40;
        const startY = isLandscape ? 130 : 180;
        const spacing = isLandscape ? 50 : 65;
        const backY = isLandscape ? 480 : 650;

        return [
            { id: 'controls', x: startX, y: startY, w: tabW, h: tabH, title: "CONTROLS" },
            { id: 'difficulty', x: startX, y: startY + spacing, w: tabW, h: tabH, title: "DIFFICULTY" },
            { id: 'screen', x: startX, y: startY + spacing * 2, w: tabW, h: tabH, title: "SCREEN" },
            { id: 'av', x: startX, y: startY + spacing * 3, w: tabW, h: tabH, title: "A/V CONFIG" },
            { id: 'back', x: startX, y: backY, w: tabW, h: tabH, title: "BACK" }
        ];
    }

    function getDifficultyButtons() {
        const btnW = isLandscape ? 480 : 300;
        const btnH = 50;
        const btnX = isLandscape ? 250 : 240;
        const startY = isLandscape ? 200 : 240;
        const spacing = isLandscape ? 60 : 70;

        return [
            { id: 'EASY', x: btnX, y: startY, w: btnW, h: btnH, label: "EASY" },
            { id: 'MEDIUM', x: btnX, y: startY + spacing, w: btnW, h: btnH, label: "MEDIUM" },
            { id: 'HARD', x: btnX, y: startY + spacing * 2, w: btnW, h: btnH, label: "HARD" }
        ];
    }

    function getScreenOptions() {
        const btnW = isLandscape ? 480 : 300;
        const btnH = 50;
        const btnX = isLandscape ? 250 : 240;
        const startY = isLandscape ? 200 : 240;
        const spacing = isLandscape ? 60 : 70;

        return [
            { id: 'PORTRAIT', x: btnX, y: startY, w: btnW, h: btnH, label: "PORTRAIT" },
            { id: 'LANDSCAPE', x: btnX, y: startY + spacing, w: btnW, h: btnH, label: "LANDSCAPE" },
            { id: 'AUTO', x: btnX, y: startY + spacing * 2, w: btnW, h: btnH, label: "AUTO (SENSOR)" }
        ];
    }

    function getAVOptions() {
        const btnW = isLandscape ? 480 : 300;
        const btnH = 45;
        const btnX = isLandscape ? 250 : 240;
        const startY = isLandscape ? 200 : 240;
        const spacing = isLandscape ? 60 : 70;

        return [
            {
                id: 'toggleSound', x: btnX, y: startY, w: btnW, h: btnH,
                label: () => soundEnabled ? "SOUND: ENABLED" : "SOUND: MUTED",
                color: () => soundEnabled ? COLOR_BALL : '#ff3333'
            },
            {
                id: 'toggleCRT', x: btnX, y: startY + spacing, w: btnW, h: btnH,
                label: () => crtEnabled ? "CRT SHADER: ON" : "CRT SHADER: OFF",
                color: () => crtEnabled ? COLOR_BALL : '#ff3333'
            }
        ];
    }

    function soloPauseButtonHit(x, y) {
        if (isLandscape) {
            // Landscape: top-right corner box
            return (x >= logicalWidth - 120 && y <= 120);
        } else {
            // Portrait: top-right corner box
            return (x >= 480 && y <= 120);
        }
    }

    // Touch Helper to map client coordinates to logical dimensions
    function getTouchLogicalPoint(touch) {
        return getCanvasPoint(touch.clientX, touch.clientY);
    }

    // Retained Touch Synchronization helper
    function syncActiveTouches(e) {
        activeTouches = Array.from(e.touches).map(t => ({
            id: t.identifier,
            ...getTouchLogicalPoint(t)
        }));
    }

    // Lock resting fingers back to active PvP bounds (completely prevents frozen finger desync)
    function rebindActivePvPTouches() {
        p1TouchId = null;
        p2TouchId = null;
        for (let touch of activeTouches) {
            if (!isLandscape) {
                // Portrait split: Top/Bottom
                if (touch.y > 400) {
                    if (p1TouchId === null) p1TouchId = touch.id;
                } else {
                    if (p2TouchId === null) p2TouchId = touch.id;
                }
            } else {
                // Landscape split: Left/Right
                if (touch.x < logicalWidth / 2) {
                    if (p1TouchId === null) p1TouchId = touch.id;
                } else {
                    if (p2TouchId === null) p2TouchId = touch.id;
                }
            }
        }
    }

    function handleMenuClick(canvasX, canvasY) {
        initAudio();

        // Prevent instant trigger state overlaps
        if (stateTransitionCooldown > 0) return;

        if (gameState === 'START') {
            const startButtons = getMainMenuButtons();
            for (let i = 0; i < startButtons.length; i++) {
                const btn = startButtons[i];
                if (canvasX >= btn.x && canvasX <= btn.x + btn.w && canvasY >= btn.y && canvasY <= btn.y + btn.h) {
                    playSound('paddle');
                    menuHighlightIndex = i; // Align highlighted arrow on click
                    if (btn.mode === 'settings') {
                        gameState = 'SETTINGS';
                        stateTransitionCooldown = 15;
                        settingsFocusZone = 'sidebar';
                        settingsHighlightTab = 0;
                        activeSettingTab = 'controls'; // Setup default tab
                    } else {
                        startNewGame(btn.mode);
                    }
                    return;
                }
            }
        } else if (gameState === 'SETTINGS') {
            // Check sidebar tabs
            const tabs = getSettingsTabs();
            for (let i = 0; i < tabs.length; i++) {
                const tab = tabs[i];
                if (canvasX >= tab.x && canvasX <= tab.x + tab.w && canvasY >= tab.y && canvasY <= tab.y + tab.h) {
                    playSound('wall');
                    settingsHighlightTab = i;
                    activeSettingTab = tab.id;
                    if (tab.id === 'back') {
                        gameState = 'START';
                        stateTransitionCooldown = 15;
                    } else {
                        settingsFocusZone = 'content';
                        settingsHighlightOption = 0;
                    }
                    return;
                }
            }
            // Check dynamic difficulty content
            if (activeSettingTab === 'difficulty' && settingsFocusZone === 'content') {
                const diffBtns = getDifficultyButtons();
                for (let i = 0; i < diffBtns.length; i++) {
                    const btn = diffBtns[i];
                    if (canvasX >= btn.x && canvasX <= btn.x + btn.w && canvasY >= btn.y && canvasY <= btn.y + btn.h) {
                        aiDifficulty = btn.id;
                        settingsHighlightOption = i;
                        playSound('paddle');
                        return;
                    }
                }
            }
            // Check dynamic screen content
            if (activeSettingTab === 'screen' && settingsFocusZone === 'content') {
                const screenBtns = getScreenOptions();
                for (let i = 0; i < screenBtns.length; i++) {
                    const btn = screenBtns[i];
                    if (canvasX >= btn.x && canvasX <= btn.x + btn.w && canvasY >= btn.y && canvasY <= btn.y + btn.h) {
                        orientationSetting = btn.id;
                        settingsHighlightOption = i;
                        playSound('paddle');
                        resize(); // Instantly apply screen changes
                        return;
                    }
                }
            }
            // Check dynamic A/V content
            if (activeSettingTab === 'av' && settingsFocusZone === 'content') {
                const avOpts = getAVOptions();
                for (let i = 0; i < avOpts.length; i++) {
                    const opt = avOpts[i];
                    if (canvasX >= opt.x && canvasX <= opt.x + opt.w && canvasY >= opt.y && canvasY <= opt.y + opt.h) {
                        settingsHighlightOption = i;
                        if (opt.id === 'toggleSound') {
                            soundEnabled = !soundEnabled;
                            playSound('paddle');
                        } else if (opt.id === 'toggleCRT') {
                            crtEnabled = !crtEnabled;
                            playSound('paddle');
                        }
                    }
                }
            }
        } else if (gameState === 'PLAYING') {
            if (isPaused) {
                // When paused, ONLY check the resume/menu buttons
                const resumeW = 300;
                const resumeH = 50;
                const resumeX = (logicalWidth - resumeW) / 2;
                const resumeY = isLandscape ? 310 : 410;

                // Check Resume Button bounds
                if (canvasX >= resumeX && canvasX <= resumeX + resumeW && canvasY >= resumeY && canvasY <= resumeY + resumeH) {
                    isPaused = false;
                    pauseHighlightIndex = 0;
                    playSound('paddle');
                    return;
                }

                // Check Return to Menu Button bounds
                const rbtnX = resumeX;
                const rbtnY = isLandscape ? 390 : 490;
                const rbtnW = 300;
                const rbtnH = 50;
                if (canvasX >= rbtnX && canvasX <= rbtnX + rbtnW && canvasY >= rbtnY && canvasY <= rbtnY + rbtnH) {
                    isPaused = false;
                    gameState = 'START';
                    stateTransitionCooldown = 15;
                    playSound('wall');
                    return;
                }
                return; // Block any other unpausing clicks when active menu is rendered
            } else {
                // Not paused: check active gameplay pause triggers
                if (gameMode === 4) {
                    // PvP mode: Expanded Highly-Ergonomic Invisible Pause target (x: 120-480, y: 350-450)
                    if (canvasX >= 120 && canvasX <= 480 && canvasY >= 350 && canvasY <= 450) {
                        togglePause();
                        return;
                    }
                } else {
                    // Solo modes: Highly ergonomic Top-Right corner tap button box
                    if (soloPauseButtonHit(canvasX, canvasY)) {
                        togglePause();
                        return;
                    }
                }
            }
        } else if (gameState === 'GAMEOVER') {
            playSound('wall');
            gameState = 'START';
            stateTransitionCooldown = 15;
        }
    }

    // Pointer event translation based strictly on game canvas's logical coordinate grid
    function getCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (clientX - rect.left) * (logicalWidth / rect.width),
            y: (clientY - rect.top) * (logicalHeight / rect.height)
        };
    }

    // Mouse Listeners (Explicit Window Focus Lock)
    canvas.addEventListener('mousedown', (e) => {
        window.focus(); // Force full input frame focus
        const pt = getCanvasPoint(e.clientX, e.clientY);
        handleMenuClick(pt.x, pt.y);
        mouseActive = true;
        mouseTouchPoint = pt;
    });
    window.addEventListener('mousemove', (e) => {
        if (mouseActive) mouseTouchPoint = getCanvasPoint(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', () => mouseActive = false);

    // Touch Listeners (Supports Secured Multi-Touch Paddle Mapping & Explicit Focus Lock)
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        window.focus(); // Force full input frame focus
        initAudio();
        syncActiveTouches(e);

        // Handle menu triggers
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const pt = getTouchLogicalPoint(t);
            handleMenuClick(pt.x, pt.y);

            if (gameState === 'PLAYING' && !isPaused && gameMode === 4) {
                // Securely bypass touch lock registering on active pause button zone
                const hitPauseButton = (pt.x >= 120 && pt.x <= 480 && pt.y >= 350 && pt.y <= 450);
                if (!hitPauseButton) {
                    if (!isLandscape) {
                        if (pt.y > 400) {
                            if (p1TouchId === null) p1TouchId = t.identifier;
                        } else {
                            if (p2TouchId === null) p2TouchId = t.identifier;
                        }
                    } else {
                        if (pt.x < logicalWidth / 2) {
                            if (p1TouchId === null) p1TouchId = t.identifier;
                        } else {
                            if (p2TouchId === null) p2TouchId = t.identifier;
                        }
                    }
                }
            }
        }

        // Setup simple two-finger tap pause gesture anywhere for solo play
        if (gameState === 'PLAYING' && gameMode !== 4) {

    function handlePaddleBounce(paddle, isLeftOrBottom) {
        playSound('paddle');

        if (isLeftOrBottom || gameMode === 3 || gameMode === 4) {

        let relativeIntersect = 0;

        if (!isLandscape) {
            // PORTRAIT PHYS: Rebound vertically (flip vy)
            ball.vy = (isLeftOrBottom ? -1 : 1) * Math.abs(ball.vy);

            const paddleCenter = paddle.x + paddle.width / 2;
            relativeIntersect = (ball.x - paddleCenter) / (paddle.width / 2);
            relativeIntersect = Math.max(-1, Math.min(1, relativeIntersect));

            ball.vx += relativeIntersect * (ball.speed * 0.5);

            // Clamp vertical deflection bounds
            const maxHorizontalSpeed = ball.speed * 0.85;
            ball.vx = Math.max(-maxHorizontalSpeed, Math.min(maxHorizontalSpeed, ball.vx));

            // Spin math based on X displacement
            const paddleVelX = isLeftOrBottom ? (player.x - player.prevX) : (ai.x - ai.prevX);
            const addedVx = paddleVelX * 0.35;
            const tempVx = ball.vx + addedVx;
            if (ball.vx > 0) {
                ball.vx = Math.max(ball.vx * 0.5, Math.min(ball.vx * 1.5, tempVx));
            } else if (ball.vx < 0) {
                ball.vx = Math.min(ball.vx * 0.5, Math.max(ball.vx * 1.5, tempVx));
            } else {
                ball.vx = Math.max(-2, Math.min(2, addedVx));
            }
        } else {
            // LANDSCAPE PHYS: Rebound horizontally (flip vx)
            ball.vx = (isLeftOrBottom ? 1 : -1) * Math.abs(ball.vx);

            const paddleCenter = paddle.y + paddle.height / 2;
            relativeIntersect = (ball.y - paddleCenter) / (paddle.height / 2);
            relativeIntersect = Math.max(-1, Math.min(1, relativeIntersect));

            ball.vy += relativeIntersect * (ball.speed * 0.5);

            // Clamp horizontal deflection bounds
            const maxVerticalSpeed = ball.speed * 0.85;
            ball.vy = Math.max(-maxVerticalSpeed, Math.min(maxVerticalSpeed, ball.vy));

            // Spin math based on Y displacement
            const paddleVelY = isLeftOrBottom ? (player.y - player.prevY) : (ai.y - ai.prevY);
            const addedVy = paddleVelY * 0.35;
            const tempVy = ball.vy + addedVy;
            if (ball.vy > 0) {
                ball.vy = Math.max(ball.vy * 0.5, Math.min(ball.vy * 1.5, tempVy));
            } else if (ball.vy < 0) {
                ball.vy = Math.min(ball.vy * 0.5, Math.max(ball.vy * 1.5, tempVy));
            } else {
                ball.vy = Math.max(-2, Math.min(2, addedVy));
            }
        }

        // Renormalize vector speed continuity
        const currentMag = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        ball.vx = (ball.vx / currentMag) * ball.speed;
        ball.vy = (ball.vy / currentMag) * ball.speed;

        // Position alignment adjustments
        if (!isLandscape) {
            if (isLeftOrBottom) {
                ball.y = paddle.y - ball.radius;
            } else {
                ball.y = paddle.y + paddle.height + ball.radius;
            }
        } else {
            if (isLeftOrBottom) {
                ball.x = paddle.x + paddle.width + ball.radius;
            } else {
                ball.x = paddle.x - ball.radius;
            }
        }
    }

                    idealTargetBall = (ball.y * (1 - lookaheadFactor)) + (futureY * lookaheadFactor);
                } else {
                    idealTargetBall = logicalHeight / 2;
                    activeSpeed = ai.speed * 0.3; // Limit speed to 30% when relaxing back to center
                    lerpFactor = 0.05;           // Slow, lazy interpolation factor
                }

                ai.currentTargetY += (idealTargetBall - ai.currentTargetY) * lerpFactor * timeScale;
                const distanceToTarget = (ai.currentTargetY - (ai.height / 2)) - ai.y;
                let moveAmount = Math.max(-activeSpeed, Math.min(activeSpeed, distanceToTarget * 0.3));

                ai.y += moveAmount * timeScale;
            }
        }

        // Clamp AI bounds
        ai.x = Math.max(0, Math.min(logicalWidth - ai.width, ai.x));
        ai.y = Math.max(0, Math.min(logicalHeight - ai.height, ai.y));

        // Halt ball physics if serve delay countdown is currently running
        if (serveDelayFrames > 0) return;

        // --- 3. Move Ball (Continuous Collision Detection) ---
        let moveDist = Math.sqrt((ball.vx * timeScale) ** 2 + (ball.vy * timeScale) ** 2);
        let steps = Math.max(1, Math.ceil(moveDist / ball.radius));
        let stepX = (ball.vx * timeScale) / steps;
        let stepY = (ball.vy * timeScale) / steps;

        for (let i = 0; i < steps; i++) {
            ball.x += stepX;
            ball.y += stepY;
            let bounced = false;

            if (!isLandscape) {
                // PORTRAIT COLLISION PHYSICS

                // Wall Collisions
                if (ball.x - ball.radius <= 0) {
                    ball.x = ball.radius;
                    ball.vx = Math.abs(ball.vx);
                    bounced = true;
                    playSound('wall');
                    triggerShake(2.5, 4);
                    createSparks(ball.x, ball.y, '#ffffff');
                } else if (ball.x + ball.radius >= logicalWidth) {
                    ball.x = logicalWidth - ball.radius;
                    ball.vx = -Math.abs(ball.vx);
                    bounced = true;
                    playSound('wall');
                    triggerShake(2.5, 4);
                    createSparks(ball.x, ball.y, '#ffffff');
                }

                // Top Boundary Rules
                if (gameMode === 1 && ball.y - ball.radius <= 0) {
                    ball.y = ball.radius;
                    ball.vy = Math.abs(ball.vy);
                    bounced = true;
                    playSound('wall');
                    triggerShake(2.5, 4);
                    createSparks(ball.x, ball.y, '#ffffff');
                } else if ((gameMode === 2 || gameMode === 3 || gameMode === 4) && ball.y + ball.radius < 0) {
                    if (gameMode === 2) {
                        score += 5;
                        playSound('score');
                        triggerShake(7, 12);
                        createSparks(ball.x, 0, COLOR_BALL);
                        resetBall(true);
                        break;
                    } else if (gameMode === 4) {
                        scoreP1++;
                        playSound('score');
                        triggerShake(7, 12);
                        createSparks(ball.x, 0, COLOR_BALL);
                        if (scoreP1 >= MAX_SCORE && (scoreP1 - scoreP2) >= 2) triggerGameOver(1);
                        else resetBall(false, -1);
                        break;
                    } else {
                        triggerGameOver();
                        break;
                    }
                }

                // Top Paddle Collision
                if ((gameMode === 2 || gameMode === 3 || gameMode === 4) && ball.vy < 0) {
                    if (ball.y - ball.radius <= ai.y + ai.height && ball.y + ball.radius >= ai.y &&
                        ball.x + ball.radius >= ai.x && ball.x - ball.radius <= ai.x + ai.width) {
                        handlePaddleBounce(ai, false);
                        bounced = true;
                    }
                }

                // Bottom Paddle Collision
                if (ball.vy > 0) {
                    if (ball.y + ball.radius >= player.y && ball.y - ball.radius <= player.y + player.height &&
                        ball.x + ball.radius >= player.x && ball.x - ball.radius <= player.x + player.width) {
                        handlePaddleBounce(player, true);
                        bounced = true;
                    }
                }

                // Bottom Boundary Rule
                if (ball.y - ball.radius > logicalHeight) {
                    if (gameMode === 4) {
                        scoreP2++;
                        playSound('score');
                        triggerShake(7, 12);
                        createSparks(ball.x, logicalHeight, COLOR_BALL);
                        if (scoreP2 >= MAX_SCORE && (scoreP2 - scoreP1) >= 2) triggerGameOver(2);
                        else resetBall(false, 1);
                    } else {
                        triggerGameOver();
                    }
                    break;
                }

            } else {
                // LANDSCAPE COLLISION PHYSICS

                // Top and Bottom Wall Collisions
                if (ball.y - ball.radius <= 0) {
                    ball.y = ball.radius;
                    ball.vy = Math.abs(ball.vy);
                    bounced = true;
                    playSound('wall');
                    triggerShake(2.5, 4);
                    createSparks(ball.x, ball.y, '#ffffff');
                } else if (ball.y + ball.radius >= logicalHeight) {
                    ball.y = logicalHeight - ball.radius;
                    ball.vy = -Math.abs(ball.vy);
                    bounced = true;
                    playSound('wall');
                    triggerShake(2.5, 4);
                    createSparks(ball.x, ball.y, '#ffffff');
                }

                // Goal Zones (Left and Right borders)
                if (ball.x + ball.radius < 0) {
                    // Out on the Left (P1's side). Scores for P2/AI
                    if (gameMode === 4) {
                        scoreP2++;
                        playSound('score');
                        triggerShake(7, 12);
                        createSparks(0, ball.y, COLOR_BALL);
                        if (scoreP2 >= MAX_SCORE && (scoreP2 - scoreP1) >= 2) triggerGameOver(2);
                        else resetBall(false, 1); // Serve RIGHT towards P1
                    } else {
                        triggerGameOver(); // Solo modes game over on left goal
                    }
                    break;
                } else if (ball.x - ball.radius > logicalWidth) {
                    // Out on the Right (P2/AI's side). Scores for P1/Player
                    if (gameMode === 1) {
                        // In Landscape Wall Mode, Right side acts as a bouncy wall!
                        ball.x = logicalWidth - ball.radius;
                        ball.vx = -Math.abs(ball.vx);
                        bounced = true;
                        playSound('wall');
                        triggerShake(2.5, 4);
                        createSparks(ball.x, ball.y, '#ffffff');
                    } else {
                        if (gameMode === 2) {
                            score += 5;
                            playSound('score');
                            triggerShake(7, 12);
                            createSparks(logicalWidth, ball.y, COLOR_BALL);
                            resetBall(true);
                        } else if (gameMode === 4) {
                            scoreP1++;
                            playSound('score');
                            triggerShake(7, 12);
                            createSparks(logicalWidth, ball.y, COLOR_BALL);
                            if (scoreP1 >= MAX_SCORE && (scoreP1 - scoreP2) >= 2) triggerGameOver(1);
                            else resetBall(false, -1); // Serve LEFT towards P2
                        } else {
                            triggerGameOver(); // Bot-only spectators game over
                        }
                        break;
                    }
                }

                // Left Paddle Collision (Player 1)
                if (ball.vx < 0) {
                    if (ball.x - ball.radius <= player.x + player.width && ball.x + ball.radius >= player.x &&
                        ball.y + ball.radius >= player.y && ball.y - ball.radius <= player.y + player.height) {
                        handlePaddleBounce(player, true);
                        bounced = true;
                    }
                }

                // Right Paddle Collision (AI / Player 2)
                if ((gameMode === 2 || gameMode === 3 || gameMode === 4) && ball.vx > 0) {
                    if (ball.x + ball.radius >= ai.x && ball.x - ball.radius <= ai.x + ai.width &&
                        ball.y + ball.radius >= ai.y && ball.y - ball.radius <= ai.y + ai.height) {
                        handlePaddleBounce(ai, false);
                        bounced = true;
                    }
                }
            }

            if (bounced) {
                stepX = (ball.vx * timeScale) / steps;
                stepY = (ball.vy * timeScale) / steps;
            }
        }
    }

    function draw() {
        ctx.save();

        // Execute Screen Shake translations
        if (shakeTime > 0) {

        ctx.fillStyle = COLOR_BG;

                } else {

                    ctx.fillText("• RIGHT PADDLE: UP/DOWN ARROWS", contentX + 20, contentY + 105);
                }
                ctx.fillText("• OR MULTI-TOUCH HALVES", contentX + 20, contentY + 135);

                ctx.font = `13px ${FONT_FAMILY}`;
                ctx.fillStyle = COLOR_BALL;
                ctx.fillText("HOTKEYS", contentX + 20, contentY + 190);

                ctx.font = `9px ${FONT_FAMILY}`;
                ctx.fillStyle = COLOR_TEXT;
                ctx.fillText("• 1-4 : SWAP MODES", contentX + 20, contentY + 225);
                ctx.fillText("• R   : RESTART RUN", contentX + 20, contentY + 255);
                ctx.fillText("• P   : PAUSE ACTION", contentX + 20, contentY + 285);
                ctx.fillText("• ESC : MAIN MENU", contentX + 20, contentY + 315);

                // Show hint to return
                if (settingsFocusZone === 'content') {

                    ctx.lineWidth = isOptionHighlighted ? 3 : 2;

                for (let i = 0; i < screenBtns.length; i++) {

                    const isSelected = orientationSetting === btn.id;
                    const isOptionHighlighted = (settingsFocusZone === 'content' && settingsHighlightOption === i);

                    ctx.fillStyle = isOptionHighlighted ? COLOR_BALL : (isSelected ? '#000000' : COLOR_TEXT);
                    ctx.textAlign = 'center';
                    ctx.font = `11px ${FONT_FAMILY}`;

                    let btnText = btn.label;
                    if (isOptionHighlighted) {
                        btnText = `> ${btnText} <`;
                    }
                    ctx.fillText(btnText, btn.x + btn.w / 2, btn.y + btn.h / 2 + 5);
                }

                // Back hint
                if (settingsFocusZone === 'content') {
                    ctx.fillStyle = COLOR_MUTED;

            } else if (activeSettingTab === 'av') {

                ctx.fillStyle = COLOR_BALL;
                ctx.fillText("A/V CONFIG", contentX + 20, contentY + 40);

                const avOpts = getAVOptions();
                for (let i = 0; i < avOpts.length; i++) {
                    const opt = avOpts[i];
                    const isOptionHighlighted = (settingsFocusZone === 'content' && settingsHighlightOption === i);

                    ctx.fillStyle = isOptionHighlighted ? '#152511' : opt.color();
                    ctx.fillRect(opt.x, opt.y, opt.w, opt.h);

                    ctx.strokeStyle = isOptionHighlighted ? COLOR_TEXT : '#333333';
                    ctx.lineWidth = isOptionHighlighted ? 3 : 2;
                    ctx.strokeRect(opt.x, opt.y, opt.w, opt.h);

                    ctx.fillStyle = isOptionHighlighted ? COLOR_BALL : '#000000';
                    ctx.textAlign = 'center';
                    ctx.font = `11px ${FONT_FAMILY}`;

                    let optText = opt.label();
                    if (isOptionHighlighted) {
                        optText = `> ${optText} <`;
                    }
                    ctx.fillText(optText, opt.x + opt.w / 2, opt.y + opt.h / 2 + 5);
                }

                // Back hint
                if (settingsFocusZone === 'content') {
                    ctx.fillStyle = COLOR_MUTED;
                    ctx.textAlign = 'center';

                }
            }

        } else if (gameState === 'PLAYING') {
            // Draw retro center division line (swaps orientation cleanly)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 4;
            ctx.setLineDash([15, 15]);
            if (!isLandscape) {
                ctx.beginPath();
                ctx.moveTo(10, 400);
                ctx.lineTo(logicalWidth - 10, 400);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.moveTo(400, 10);
                ctx.lineTo(400, logicalHeight - 10);
                ctx.stroke();
            }
            ctx.setLineDash([]); // Reset dash state

            // Determine Dynamic Non-Overlapping HUD layout texts
            let topValue = "0";
            let bottomValue = "0";
            let topLabel = "BOT";
            let bottomLabel = "SCORE";

            if (gameMode === 4) {
                topValue = scoreP2.toString();
                bottomValue = scoreP1.toString();
                topLabel = "P2";
                bottomLabel = "P1";
            } else if (gameMode === 1) {
                topValue = highScoreMode1.toString();
                bottomValue = score.toString();
                topLabel = "BEST";
            } else if (gameMode === 2) {
                topValue = highScoreMode2.toString();
                bottomValue = score.toString();
                topLabel = "BEST";
            } else if (gameMode === 3) {
                topValue = "BOT";
                bottomValue = score.toString();
                topLabel = "SPEED";
            }

            // Draw Elegant Giant Background Numbers (Swaps layout seamlessly to match sides)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.textAlign = 'center';
            ctx.font = `80px ${FONT_FAMILY}`;

            if (!isLandscape) {
                // Portrait: Top and bottom values
                ctx.fillText(topValue, logicalWidth / 2, 300);
                ctx.fillText(bottomValue, logicalWidth / 2, 540);

                // Small labels
                ctx.font = `10px ${FONT_FAMILY}`;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillText(topLabel, logicalWidth / 2, 210);
                ctx.fillText(bottomLabel, logicalWidth / 2, 450);
            } else {
                // Landscape: Left and right values
                ctx.fillText(bottomValue, logicalWidth / 4, logicalHeight / 2 + 30); // Player 1 (Left)
                ctx.fillText(topValue, logicalWidth * 0.75, logicalHeight / 2 + 30); // AI/Player 2 (Right)

                // Small labels
                ctx.font = `10px ${FONT_FAMILY}`;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillText(bottomLabel, logicalWidth / 4, logicalHeight / 2 - 60);
                ctx.fillText(topLabel, logicalWidth * 0.75, logicalHeight / 2 - 60);
            }

            // Match Point & Deuce Warnings in Local PvP mode (Visible ONLY during serve delay countdown)
            if (gameMode === 4 && serveDelayFrames > 0) {
                ctx.font = `12px ${FONT_FAMILY}`;
                ctx.textAlign = 'center';

                const p1NeedsToWin = Math.max(MAX_SCORE, scoreP2 + 2);
                const p2NeedsToWin = Math.max(MAX_SCORE, scoreP1 + 2);

                if (scoreP1 >= 10 && scoreP2 >= 10 && scoreP1 === scoreP2) {
                    ctx.fillStyle = COLOR_BALL; // Semitransparent green deuce indicator
                    if (!isLandscape) {
                        ctx.fillText("DEUCE - WIN BY 2", logicalWidth / 2, 180);
                        ctx.fillText("DEUCE - WIN BY 2", logicalWidth / 2, 620);
                    } else {
                        ctx.fillText("DEUCE - WIN BY 2", logicalWidth / 4, logicalHeight / 2 - 110);
                        ctx.fillText("DEUCE - WIN BY 2", logicalWidth * 0.75, logicalHeight / 2 - 110);
                    }
                } else {
                    ctx.fillStyle = '#ff3333'; // Vibrant warning red

                    if (!isLandscape) {
                        if (scoreP1 >= p1NeedsToWin - 1 && scoreP1 > scoreP2) {
                            ctx.fillText("MATCH POINT", logicalWidth / 2, 180); // Threat to P2 (Top half)
                        }
                        if (scoreP2 >= p2NeedsToWin - 1 && scoreP2 > scoreP1) {
                            ctx.fillText("MATCH POINT", logicalWidth / 2, 620); // Threat to P1 (Bottom half)
                        }
                    } else {
                        if (scoreP1 >= p1NeedsToWin - 1 && scoreP1 > scoreP2) {
                            ctx.fillText("MATCH POINT", logicalWidth * 0.75, logicalHeight / 2 - 110); // Threat to P2 (Right half)
                        }
                        if (scoreP2 >= p2NeedsToWin - 1 && scoreP2 > scoreP1) {
                            ctx.fillText("MATCH POINT", logicalWidth / 4, logicalHeight / 2 - 110); // Threat to P1 (Left half)
                        }
                    }
                }
            }

            // phosphor green "NEW BEST" alert in solo modes
            const hasBeatenHighScore = (gameMode === 1 || gameMode === 2) && score > baselineHighScore && baselineHighScore > 0;
            if (hasBeatenHighScore) {
                ctx.fillStyle = COLOR_BALL;
                ctx.font = `10px ${FONT_FAMILY}`;
                ctx.textAlign = 'left';
                const isBestBlinking = Math.floor(Date.now() / 300) % 2 === 0;
                if (isBestBlinking) {
                    ctx.fillText("NEW BEST!", isLandscape ? 40 : 120, 80);
                }
            }

            // Screen boundary retro overlay borders
            ctx.strokeStyle = '#222222';
            ctx.lineWidth = 4;
            ctx.strokeRect(2, 2, logicalWidth - 4, logicalHeight - 4);

            // Spectator mode speed display centered elegantly on the net line
            if (gameMode === 3 && speedNotificationTimer > 0) {
                ctx.fillStyle = COLOR_BALL;
                ctx.font = `12px ${FONT_FAMILY}`;
                ctx.textAlign = 'center';
                ctx.fillText("SPEED: " + timeScale.toFixed(1) + "x", logicalWidth / 2, isLandscape ? 280 : 390);
                speedNotificationTimer--;
            }

            // Draw visual details (Trail and sparks)
            drawVisualEffects();

            // Draw bottom/left paddle
            ctx.fillStyle = COLOR_PADDLE;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw top/right paddle (Modes 2, 3, & 4)
            if (gameMode === 2 || gameMode === 3 || gameMode === 4) {
                ctx.fillStyle = COLOR_PADDLE;
                ctx.fillRect(ai.x, ai.y, ai.width, ai.height);
            }

            // Draw Ball (Always visible during match run)
            ctx.fillStyle = COLOR_BALL;
            ctx.fillRect(ball.x - ball.radius, ball.y - ball.radius, ball.radius * 2, ball.radius * 2);

            // Draw a subtle, premium projection line during countdown to preview trajectory
            if (serveDelayFrames > 0) {
                ctx.save();
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.45)'; // semitransparent phosphor green arrow
                ctx.lineWidth = 3;
                ctx.setLineDash([8, 6]);
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                const angle = Math.atan2(ball.vy, ball.vx);
                ctx.lineTo(ball.x + Math.cos(angle) * 80, ball.y + Math.sin(angle) * 80);
                ctx.stroke();
                ctx.restore();
            }

            // Centralized Serve Delay countdown screen overlay
            if (serveDelayFrames > 0) {
                ctx.fillStyle = COLOR_TEXT;
                ctx.textAlign = 'center';
                ctx.font = `30px ${FONT_FAMILY}`;

                let countdownLabel = "READY";
                if (serveDelayFrames > 90) countdownLabel = "3";
                else if (serveDelayFrames > 60) countdownLabel = "2";
                else if (serveDelayFrames > 30) countdownLabel = "1";
                else countdownLabel = "READY";

                // Clear, solid font rendering (no blinding countdown numbers)
                ctx.fillText(countdownLabel, logicalWidth / 2, logicalHeight / 2 - 40);
            }

            // Draw Dedicated Corner Pause Button in Solo Modes (Modes 1, 2, 3)
            if (gameMode !== 4) {
                ctx.save();
                // Draw a subtle, high-contrast corner box
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.lineWidth = 2;
                const pxX = isLandscape ? logicalWidth - 70 : 530;
                ctx.strokeRect(pxX, 30, 40, 40);

                // Draw classic retro twin vertical bars
                ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
                ctx.fillRect(pxX + 13, 40, 4, 20);
                ctx.fillRect(pxX + 23, 40, 4, 20);
                ctx.restore();
            }

            // Draw Pause Button inside the Center Net Division Line in PvP Mode (gameMode === 4) - Hidden during countdown!
            if (gameMode === 4 && serveDelayFrames === 0) {
                ctx.save();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
                ctx.lineWidth = 2;

                const btnW = 40;
                const btnH = 40;
                const btnX = (logicalWidth - btnW) / 2; // 280 (portrait), 380 (landscape)
                const btnY = (logicalHeight - btnH) / 2; // 380 (portrait), 280 (landscape)

                ctx.fillRect(btnX, btnY, btnW, btnH);
                ctx.strokeRect(btnX, btnY, btnW, btnH);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fillRect(btnX + 13, btnY + 10, 4, 20);
                ctx.fillRect(btnX + 23, btnY + 10, 4, 20);
                ctx.restore();
            }

            // --- Draw Pause State Overlay inside playing sequence ---
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, logicalWidth, logicalHeight);

                ctx.fillStyle = COLOR_TEXT;
                ctx.textAlign = 'center';
                ctx.font = `28px ${FONT_FAMILY}`;
                ctx.fillText("PAUSED", logicalWidth / 2, logicalHeight / 2 - 120);

                ctx.fillStyle = COLOR_MUTED;
                ctx.font = `9px ${FONT_FAMILY}`;
                ctx.fillText("GAME TIMELINE FROZEN", logicalWidth / 2, logicalHeight / 2 - 70);

                // Draw "RESUME GAME" Button
                const resumeW = 300;
                const resumeH = 50;
                const resumeX = (logicalWidth - resumeW) / 2;
                const resumeY = isLandscape ? 310 : 410;
                const isResumeHighlighted = (pauseHighlightIndex === 0);

                ctx.fillStyle = isResumeHighlighted ? '#152511' : '#222222';
                ctx.fillRect(resumeX, resumeY, resumeW, resumeH);
                ctx.strokeStyle = isResumeHighlighted ? COLOR_BALL : COLOR_BALL + '88';
                ctx.lineWidth = isResumeHighlighted ? 3 : 2;
                ctx.strokeRect(resumeX, resumeY, resumeW, resumeH);

                ctx.fillStyle = isResumeHighlighted ? COLOR_BALL : COLOR_TEXT;
                ctx.font = `11px ${FONT_FAMILY}`;
                let resumeText = "RESUME GAME";
                if (isResumeHighlighted) resumeText = `> ${resumeText} <`;
                ctx.fillText(resumeText, logicalWidth / 2, resumeY + 31);

                // Draw "RETURN TO MENU" Button
                const rbtnX = resumeX;
                const rbtnY = isLandscape ? 390 : 490;
                const rbtnW = 300;
                const rbtnH = 50;
                const isReturnHighlighted = (pauseHighlightIndex === 1);

                ctx.fillStyle = isReturnHighlighted ? '#251515' : '#222222';
                ctx.fillRect(rbtnX, rbtnY, rbtnW, rbtnH);
                ctx.strokeStyle = isReturnHighlighted ? '#ff3333' : COLOR_MUTED;
                ctx.lineWidth = isReturnHighlighted ? 3 : 2;
                ctx.strokeRect(rbtnX, rbtnY, rbtnW, rbtnH);

                ctx.fillStyle = isReturnHighlighted ? '#ff3333' : COLOR_TEXT;
                ctx.font = `11px ${FONT_FAMILY}`;
                let returnText = "RETURN TO MENU";
                if (isReturnHighlighted) returnText = `> ${returnText} <`;
                ctx.fillText(returnText, logicalWidth / 2, rbtnY + 31);
            }

        } else if (gameState === 'GAMEOVER') {
            ctx.fillStyle = COLOR_TEXT;
            ctx.textAlign = 'center';

            ctx.font = `24px ${FONT_FAMILY}`;
            ctx.fillText("GAME OVER", logicalWidth / 2, 300);

            ctx.font = `16px ${FONT_FAMILY}`;
            ctx.fillStyle = COLOR_BALL;
            if (gameMode === 4) {
                ctx.fillText("PLAYER " + winnerMode4 + " WINS!", logicalWidth / 2, 350);
                ctx.fillStyle = COLOR_TEXT;
                ctx.fillText(scoreP1 + " - " + scoreP2, logicalWidth / 2, 380);
            } else {
                ctx.fillText("FINAL SCORE: " + score, logicalWidth / 2, 360);
            }

            ctx.fillStyle = COLOR_MUTED;
            ctx.font = `10px ${FONT_FAMILY}`;
            ctx.fillText("PRESS [1]-[4] TO PLAY AGAIN", logicalWidth / 2, 440);
            ctx.fillText("PRESS 'R' TO RESTART LAST RUN", logicalWidth / 2, 470);
            ctx.fillText("TAP OR PRESS 'ESC' FOR MENU", logicalWidth / 2, 500);
        }

        ctx.restore(); // Restores original non-shaken translation Matrix

        // Apply scanline shader overlay over the rendered layout
        drawCRTOverlay();
    }

    // Touch Lock Synchronizer Helper with safe multi-touch collision handling
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        window.focus(); // Force full input frame focus
        initAudio();
        syncActiveTouches(e);

        // Handle menu triggers
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const pt = getTouchLogicalPoint(t);
            handleMenuClick(pt.x, pt.y);

            if (gameState === 'PLAYING' && !isPaused && gameMode === 4) {
                // Ensure they didn't tap the paused symbol overlay button's extended ergonomic target
                const hitPauseButton = (pt.x >= 120 && pt.x <= 480 && pt.y >= 350 && pt.y <= 450);
                if (!hitPauseButton) {
                    if (!isLandscape) {
                        if (pt.y > 400) {
                            if (p1TouchId === null) p1TouchId = t.identifier;
                        } else {
                            if (p2TouchId === null) p2TouchId = t.identifier;
                        }
                    } else {
                        if (pt.x < logicalWidth / 2) {
                            if (p1TouchId === null) p1TouchId = t.identifier;
                        } else {
                            if (p2TouchId === null) p2TouchId = t.identifier;
                        }
                    }
                }
            }
        }

        // Setup gesture tracking for single player models
        if (gameState === 'PLAYING' && gameMode !== 4) {
            // Two-finger pause gesture (Strictly isolated to solo play)
            if (e.touches.length === 2) {
                togglePause();
            }
        }
    }, { passive: false });

    function tick() {
        update();
        draw();
        requestAnimationFrame(tick);
    }

    window.onload = function() {
        resize(); // One final ensure size scaling calculation is absolute
        tick();
    }
</script>
</body>
</html>
